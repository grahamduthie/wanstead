<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WansteadCam — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #16213e;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            border: 1px solid #0f3460;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #aaa;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.35rem;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #4ade80;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border: none;
            border-radius: 8px;
            background: #4ade80;
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #22c55e;
        }
        .error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 1.2em;
        }
        .footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="/WansteadCam.png" alt="WansteadCam" class="logo">
        <h1>Home Monitoring</h1>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Sign In</button>
            <div class="error" id="error-msg"></div>
        </form>
        <div class="footer">Powered by Raspberry Pi</div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var errorEl = document.getElementById('error-msg');
            errorEl.textContent = '';
            var btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    // Use replace() to force a fresh request, not a cached response
                    window.location.replace('/');
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            })
            .catch(function() {
                errorEl.textContent = 'Connection error';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            });
        });
    </script>
</body>
</html>
